# Video Automation Workflow Configuration
# 视频自动化工作流配置文件

# ============================================
# Step 1: 脚本生成配置
# ============================================
script:
  # 提供商：claude, openai, kimi, wenxin
  provider: "claude"
  # API Key (环境变量优先，此处为备用)
  # 如果未设置，自动使用 ANTHROPIC_API_KEY 或 ANTHROPIC_BASE_URL
  api_key: "${CLAUDE_API_KEY}"
  # Base URL (可选，用于代理或本地服务)
  # 默认使用官方 API，或设置 ANTHROPIC_BASE_URL 环境变量
  base_url: "${ANTHROPIC_BASE_URL}"
  # 模型名称 (可选)
  # 默认：claude-sonnet-4-20250514
  model: "${CLAUDE_MODEL:-claude-sonnet-4-20250514}"
  # 脚本模板文件路径
  template: "scripts/script_template.txt"
  # 默认视频时长（秒）
  default_duration: 60

# ============================================
# Step 2: 画面生成配置
# ============================================
visuals:
  # 提供商：seedream (推荐), flux, midjourney, stable_diffusion, dashscope
  provider: "seedream"
  # API Key (环境变量 ARK_API_KEY 优先)
  api_key: "${ARK_API_KEY}"
  # 生成风格
  style: "cartoon style, bright colors, clean composition"
  # 每张分镜生成的图片数量
  images_per_scene: 1
  # 输出分辨率
  resolution: "1920x1080"

# ============================================
# Step 3: 配音生成配置
# ============================================
audio:
  # 提供商：edge (免费，支持多音色), openai_tts (推荐代理模式), azure, gtts
  provider: "edge"
  # API Key (环境变量 OPENAI_API_KEY 优先)
  api_key: "${OPENAI_API_KEY:-proxy-mode}"

  # ============================================
  # OpenAI TTS 音色配置
  # ============================================
  # 音色选择 (6 种可选):
  #   - alloy: 中性音色 (默认)
  #   - echo: 男声，沉稳有力
  #   - fable: 男声，温暖叙事
  #   - onyx: 男声，深沉磁性
  #   - nova: 女声，清脆活力
  #   - shimmer: 女声，温柔甜美
  tts_voice: "echo"  # 推荐男声：echo/onyx，推荐女声：nova/shimmer

  # ============================================
  # Azure TTS 音色配置 (备用)
  # ============================================
  # 中文男声：zh-CN-YunxiNeural, zh-CN-YunjianNeural
  # 中文女声：zh-CN-XiaoxiaoNeural, zh-CN-XiaoyiNeural, zh-CN-XiaohanNeural
  voice: "zh-CN-YunxiNeural"  # 默认男声

  # 音量 (0.0-2.0)
  volume: 1.0
  # 语速 (0.5-2.0, 1.0 为正常)
  rate: 1.0

  # 背景音乐路径（可选）
  bgm:
    enabled: true
    file: "assets/bgm.mp3"
    volume: 0.3  # 背景音乐音量（0.0-1.0）

# ============================================
# Step 3.5: 字幕配置
# ============================================
subtitles:
  # 是否启用字幕
  enabled: true
  # 字幕字体 (需要系统中安装)
  # Linux: SimHei, WenQuanYi Micro Hei, Noto Sans CJK SC
  # macOS: PingFang SC, Heiti SC
  # Windows: SimHei, Microsoft YaHei
  font: "Noto Sans CJK SC"
  # 字幕大小
  size: 8
  # 字幕颜色
  color: "&HFFFFFF"  # 白色 (BGR 格式)
  # 边框颜色
  border_color: "&H000000"  # 黑色
  # 边框大小
  border_size: 2
  # 垂直边距（从底部算起，推荐 30-80）
  margin_v: 50

# ============================================
# Step 4: 视频合成配置
# ============================================
export:
  # 输出分辨率（竖屏 1080x1920，横屏 1920x1080）
  resolution: "1920x1080"
  # 帧率
  fps: 30
  # 视频编码
  codec: "libx264"
  # 视频质量（CRF，18-28，越低质量越高）
  crf: 23
  # 输出格式
  format: "mp4"

# ============================================
# Step 5: 自动发布配置
# ============================================
publish:
  # 启用自动发布
  enabled: false
  # 发布平台
  platforms:
    - "douyin"
    - "bilibili"
    - "video_account"
  # 定时发布时间（24 小时制）
  schedule: "18:00"
  # 默认标签
  default_tags:
    - "AI 视频"
    - "自动化"
    - "效率工具"

# ============================================
# 高级配置
# ============================================
advanced:
  # 工作目录
  working_dir: "./output"
  # 临时目录
  temp_dir: "./tmp"
  # 日志级别：debug, info, warning, error
  log_level: "info"
  # 失败重试次数
  retry_count: 2
  # 是否保留中间文件
  keep_intermediates: false
